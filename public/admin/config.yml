backend:
  name: git-gateway
  branch: main # (Change to master if your GitHub uses master)

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "docs"
    label: "Documentation (MDX)"
    folder: "content/docs"
    create: true
    extension: "mdx"
    format: "frontmatter"

    # Tells the CMS to search through all your subfolders
    nested:
      depth: 5

    fields:
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Description",
          name: "description",
          widget: "text",
          required: false,
        }
      - { label: "Path", name: "path", widget: "hidden", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
